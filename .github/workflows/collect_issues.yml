name: Coletor de Dados do GitHub

on:
  workflow_dispatch:
    inputs:
      repo_owner:
        description: 'Dono do repositório (ex: jabref, spring-projects)'
        required: true
        type: string
      repo_name:
        description: 'Nome do repositório (ex: jabref, spring-boot)'
        required: true
        type: string
      secret_prefix:
        description: 'Prefixo dos secrets cadastrados (ex: JABREF, SPRING-BOOT)'
        required: true
        type: string
      start_cursor:
        description: 'Start Cursor (opcional, para retomar coletas)'
        required: false
        type: string

jobs:
  coletar-dados:
    runs-on: ubuntu-latest
    
    # Previne que o job seja cancelado por timeout padrão caso o repositório seja muito grande
    timeout-minutes: 360 

    steps:
      - name: 1. Fazer checkout do código do script de coleta
        uses: actions/checkout@v4

      - name: 2. Fazer checkout do repositório alvo (para análise local de commits)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repo_owner }}/${{ github.event.inputs.repo_name }}
          path: repos_dir/${{ github.event.inputs.repo_name }}
          fetch-depth: 0 # Baixa todo o histórico de commits necessário para validação

      - name: 3. Configurar ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. Instalar dependências
        run: |
          python -m pip install --upgrade pip
          # Instala as bibliotecas utilizadas no seu script
          pip install requests python-dotenv tqdm pydriller

      - name: 5. Executar script de coleta
        env:
          # Variáveis de ambiente diretas esperadas pelo script
          REPO_OWNER: ${{ github.event.inputs.repo_owner }}
          REPO_NAME: ${{ github.event.inputs.repo_name }}
          START_CURSOR: ${{ github.event.inputs.start_cursor }}
          
          API_TOKEN_1: ${{ secrets[format('{0}_API_TOKEN_1', github.event.inputs.secret_prefix)] || '' }}
          API_TOKEN_2: ${{ secrets[format('{0}_API_TOKEN_2', github.event.inputs.secret_prefix)] || '' }}
          API_TOKEN_3: ${{ secrets[format('{0}_API_TOKEN_3', github.event.inputs.secret_prefix)] || '' }}
        run: |
          python collect_issues.py

      - name: 6. Fazer push dos dados coletados
        if: success()
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add data/${{ github.event.inputs.repo_name }}.json
          git add logs/*
          git commit -m "chore: dados coletados para ${{ github.event.inputs.repo_name }}" || echo "Nenhuma alteração para commitar"
          git push