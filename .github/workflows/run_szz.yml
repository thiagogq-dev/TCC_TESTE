name: Run SZZ 

run-name: Run SZZ - ${{ github.event.inputs.repo_path }} | branch=${{ github.event.inputs.branch }} | iteration=${{ github.event.inputs.iteration_number }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run the workflow on'
        required: true
        default: 'main'

      repo_path:
        description: 'The OWNER/REPOSITORY to run the SZZ on'
        required: true
        type: choice
        options:
          - JabRef/jabref
          - apache/pulsar
          - junit-team/junit-framework
          - keycloak/keycloak
          - spring-projects/spring-boot

      iteration_number:
        description: 'Number of the iteration to be performed'
        required: true
        default: '1'

      date_filter:
        description: 'Use date filter?'
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'

jobs:

  list-json-files:
    runs-on: ubuntu-latest

    outputs:
      json_files: ${{ steps.list-json-files.outputs.json_files }}

    steps:
      - name: Validate iteration number
        run: |
          if ! [[ "${{ github.event.inputs.iteration_number }}" =~ ^[1-9][0-9]*$ ]]; then
            echo "iteration_number must be a positive integer greater than 0"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4.1.6
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: List JSON files
        id: list-json-files
        run: |
          files=$(ls data/*.json | jq -R -s -c 'split("\n")[:-1]')
          echo "json_files=$files" >> $GITHUB_OUTPUT

  run-script:
    needs: list-json-files
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.list-json-files.outputs.json_files) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.6
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Clone pyszz_v2
        uses: actions/checkout@v4.1.6
        with:
          repository: 'thiagogquinto/pyszz_v2'
          path: 'pyszz_v2'
          ref: 'tcc_version'

      - name: Clone repository
        run: |
          mkdir -p pyszz_v2/repos_dir
          cd pyszz_v2/repos_dir
          git clone https://github.com/${{ github.event.inputs.repo_path }}.git

      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.x'

      - name: Run pyszz_v2
        working-directory: pyszz_v2/
        run: |
          filename=$(basename "${{ matrix.file }}")
          cp ../${{ matrix.file }} "$filename"

          bash ./run_docker.sh \
            "./$filename" \
            ./conf/tcc_version.yml \
            ./repos_dir/ \
            ${{ github.event.inputs.iteration_number }} \
            $([ "${{ github.event.inputs.date_filter }}" = "true" ] && echo "--date_filter")

      - name: Prepare artifact
        run: |
          mkdir -p artifact_out
          mkdir -p artifact_out/processed_jsons
          cp -r pyszz_v2/out/* artifact_out/ || true
          touch "artifact_out/processed_jsons/$(basename "${{ matrix.file }}")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: out-${{ strategy.job-index }}
          path: artifact_out/

  aggregate-and-push:
    needs: run-script

    if: always()

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.6
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts
          merge-multiple: true

      - name: Move files to out
        run: |
          mkdir -p out
          cp -r downloaded_artifacts/* out/ || true

      - name: Remove processed json files
        run: |
          for processed_file in downloaded_artifacts/processed_jsons/*; do
            [ -e "$processed_file" ] || continue
            rm -f "data/$(basename "$processed_file")"
          done

          rm -rf out/processed_jsons

      - name: Commit and push
        run: |
          git config --global user.email "thiagogquinto.dev@gmail.com"
          git config --global user.name "Thiago Quinto"

          git add out/
          git add data/

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Add bics files"
          git push